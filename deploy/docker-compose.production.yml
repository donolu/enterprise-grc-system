services:
  web:
    image: ${IMAGE_TAG:-ghcr.io/donolu/grc-platform:latest}
    command: gunicorn app.wsgi:application -b 0.0.0.0:${PORT:-8000}
    environment:
      DJANGO_SETTINGS_MODULE: app.settings.production
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL:-}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:?Set CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:?Set CELERY_RESULT_BACKEND}
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME:-localhost}
      ADDITIONAL_HOSTS: ${ADDITIONAL_HOSTS:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-}
      OBJECT_STORAGE_ENDPOINT_URL: ${OBJECT_STORAGE_ENDPOINT_URL:-}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-eu-west-2}
      OBJECT_STORAGE_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID:-}
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:-}
      OBJECT_STORAGE_PUBLIC_BASE_URL: ${OBJECT_STORAGE_PUBLIC_BASE_URL:-}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-true}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@example.com}
      METRICS_ENABLED: ${METRICS_ENABLED:-0}
      METRICS_BEARER_TOKEN: ${METRICS_BEARER_TOKEN:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - media:/workspace/app/media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8000}/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  worker:
    image: ${IMAGE_TAG:-ghcr.io/donolu/grc-platform:latest}
    command: celery -A app worker -l info --concurrency=${CELERY_WORKER_CONCURRENCY:-4}
    environment:
      DJANGO_SETTINGS_MODULE: app.settings.production
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL:-}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:?Set CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:?Set CELERY_RESULT_BACKEND}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-}
      OBJECT_STORAGE_ENDPOINT_URL: ${OBJECT_STORAGE_ENDPOINT_URL:-}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-eu-west-2}
      OBJECT_STORAGE_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID:-}
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    image: ${IMAGE_TAG:-ghcr.io/donolu/grc-platform:latest}
    command: celery -A app beat -l info
    environment:
      DJANGO_SETTINGS_MODULE: app.settings.production
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL:-}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:?Set CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:?Set CELERY_RESULT_BACKEND}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-}
      OBJECT_STORAGE_ENDPOINT_URL: ${OBJECT_STORAGE_ENDPOINT_URL:-}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-eu-west-2}
      OBJECT_STORAGE_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID:-}
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grc}
      POSTGRES_USER: ${POSTGRES_USER:-grc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grc} -d ${POSTGRES_DB:-grc}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    command: redis-server --appendonly yes
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  media:
  postgres:
  redis:
