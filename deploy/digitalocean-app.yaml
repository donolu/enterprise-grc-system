name: axim-grc
region: lon
services:
  - name: api
    image:
      registry_type: GHCR
      registry: donolu
      repository: grc-platform
      tag: latest
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health/
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: app.settings.production
      - key: SECRET_KEY
        type: SECRET
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: DIRECT_DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: REDIS_URL
        scope: RUN_TIME
        value: ${redis.REDIS_URL}
      - key: CELERY_BROKER_URL
        scope: RUN_TIME
        value: ${redis.REDIS_URL}
      - key: CELERY_RESULT_BACKEND
        scope: RUN_TIME
        value: ${redis.REDIS_URL}
      - key: PUBLIC_HOSTNAME
        value: ${APP_DOMAIN}
      - key: STORAGE_BACKEND
        value: s3
      - key: OBJECT_STORAGE_BUCKET
        type: SECRET
      - key: OBJECT_STORAGE_ENDPOINT_URL
        type: SECRET
      - key: OBJECT_STORAGE_REGION
        value: eu-west-2
      - key: OBJECT_STORAGE_ACCESS_KEY_ID
        type: SECRET
      - key: OBJECT_STORAGE_SECRET_ACCESS_KEY
        type: SECRET
      - key: CORS_ALLOWED_ORIGINS
        type: SECRET
      - key: CSRF_TRUSTED_ORIGINS
        type: SECRET
      - key: EMAIL_HOST
        type: SECRET
      - key: EMAIL_HOST_USER
        type: SECRET
      - key: EMAIL_HOST_PASSWORD
        type: SECRET
      - key: DEFAULT_FROM_EMAIL
        type: SECRET
      - key: STRIPE_PUBLISHABLE_KEY
        type: SECRET
      - key: STRIPE_SECRET_KEY
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        type: SECRET

workers:
  - name: worker
    image:
      registry_type: GHCR
      registry: donolu
      repository: grc-platform
      tag: latest
    run_command: cd /workspace/app && celery -A app worker -l info --concurrency=4
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: app.settings.production
      - key: SECRET_KEY
        type: SECRET
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: DIRECT_DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: REDIS_URL
        scope: RUN_TIME
        value: ${redis.REDIS_URL}
      - key: CELERY_BROKER_URL
        scope: RUN_TIME
        value: ${redis.REDIS_URL}
      - key: CELERY_RESULT_BACKEND
        scope: RUN_TIME
        value: ${redis.REDIS_URL}
      - key: STORAGE_BACKEND
        value: s3
      - key: OBJECT_STORAGE_BUCKET
        type: SECRET
      - key: OBJECT_STORAGE_ENDPOINT_URL
        type: SECRET
      - key: OBJECT_STORAGE_REGION
        value: eu-west-2
      - key: OBJECT_STORAGE_ACCESS_KEY_ID
        type: SECRET
      - key: OBJECT_STORAGE_SECRET_ACCESS_KEY
        type: SECRET
  - name: beat
    image:
      registry_type: GHCR
      registry: donolu
      repository: grc-platform
      tag: latest
    run_command: cd /workspace/app && celery -A app beat -l info
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: app.settings.production
      - key: SECRET_KEY
        type: SECRET
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: DIRECT_DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: REDIS_URL
        scope: RUN_TIME
        value: ${redis.REDIS_URL}
      - key: CELERY_BROKER_URL
        scope: RUN_TIME
        value: ${redis.REDIS_URL}
      - key: CELERY_RESULT_BACKEND
        scope: RUN_TIME
        value: ${redis.REDIS_URL}
      - key: STORAGE_BACKEND
        value: s3
      - key: OBJECT_STORAGE_BUCKET
        type: SECRET
      - key: OBJECT_STORAGE_ENDPOINT_URL
        type: SECRET
      - key: OBJECT_STORAGE_REGION
        value: eu-west-2
      - key: OBJECT_STORAGE_ACCESS_KEY_ID
        type: SECRET
      - key: OBJECT_STORAGE_SECRET_ACCESS_KEY
        type: SECRET

databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-dev-database
    num_nodes: 1
  - name: redis
    engine: REDIS
    version: "7"
    size: db-s-dev-database
    num_nodes: 1
