name: CI - Test and Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write
  checks: write
  security-events: write

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'
  DJANGO_SETTINGS_MODULE: app.settings.test
  POSTGRES_DB: grc_test
  POSTGRES_USER: grc
  POSTGRES_PASSWORD: grc
  POSTGRES_HOST: localhost
  POSTGRES_PORT: '5432'
  POSTGRES_TEST_DB: test_grc_${{ github.run_id }}_${{ github.run_attempt }}
  DATABASE_URL: postgres://grc:grc@localhost:5432/grc_test
  CELERY_BROKER_URL: redis://localhost:6379/0
  CELERY_RESULT_BACKEND: redis://localhost:6379/1
  AZURE_STORAGE_CONNECTION_STRING: UseDevelopmentStorage=true
  SECRET_KEY: test-secret-key-for-ci
  DEBUG: '0'

jobs:
  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: grc_test
          POSTGRES_USER: grc
          POSTGRES_PASSWORD: grc
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd "pg_isready -U grc -d grc_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      azurite:
        image: mcr.microsoft.com/azure-storage/azurite:latest
        ports:
          - 10000:10000
          - 10001:10001
          - 10002:10002
        options: >-
          --health-cmd "node -e \"require('net').connect(10000,'127.0.0.1')
          .on('connect',()=>process.exit(0))
          .on('error',()=>process.exit(1))\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: pip
        cache-dependency-path: |
          requirements.txt
          pyproject.toml

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libpq-dev \
          gettext \
          build-essential \
          python3-dev \
          libffi-dev \
          libssl-dev \
          libxml2-dev \
          libxslt1-dev \
          libjpeg-dev \
          libfreetype6-dev \
          zlib1g-dev \
          redis-tools

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-django pytest-cov ruff mypy

    - name: Wait for services
      timeout-minutes: 3
      run: bash .github/scripts/wait-for-ci-services.sh

    - name: Run database migration smoke
      run: bash .github/scripts/bootstrap-backend-ci-db.sh

    - name: Code quality checks
      working-directory: ./app
      run: |
        echo "Running Ruff linter..."
        ruff check .
        
        echo "Django system check..."
        python manage.py check

        echo "Checking OpenAPI schema freshness..."
        bash ../.github/scripts/check-openapi-schema.sh

  backend-test-shards:
    name: Backend Test Shard ${{ matrix.shard_number }}/${{ matrix.total_shards }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        total_shards: [6]
        shard_index: [0, 1, 2, 3, 4, 5]
        include:
          - shard_index: 0
            total_shards: 6
            shard_number: 1
          - shard_index: 1
            total_shards: 6
            shard_number: 2
          - shard_index: 2
            total_shards: 6
            shard_number: 3
          - shard_index: 3
            total_shards: 6
            shard_number: 4
          - shard_index: 4
            total_shards: 6
            shard_number: 5
          - shard_index: 5
            total_shards: 6
            shard_number: 6

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: grc_test
          POSTGRES_USER: grc
          POSTGRES_PASSWORD: grc
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd "pg_isready -U grc -d grc_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      azurite:
        image: mcr.microsoft.com/azure-storage/azurite:latest
        ports:
          - 10000:10000
          - 10001:10001
          - 10002:10002
        options: >-
          --health-cmd "node -e \"require('net').connect(10000,'127.0.0.1')
          .on('connect',()=>process.exit(0))
          .on('error',()=>process.exit(1))\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: pip
        cache-dependency-path: |
          requirements.txt
          pyproject.toml

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libpq-dev \
          gettext \
          build-essential \
          python3-dev \
          libffi-dev \
          libssl-dev \
          libxml2-dev \
          libxslt1-dev \
          libjpeg-dev \
          libfreetype6-dev \
          zlib1g-dev \
          redis-tools

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-django pytest-cov ruff mypy

    - name: Wait for services
      timeout-minutes: 3
      run: bash .github/scripts/wait-for-ci-services.sh

    - name: Run backend test shard
      working-directory: ./app
      run: |
        bash ../.github/scripts/run-pytest-shard.sh \
          "${{ matrix.shard_index }}" \
          "${{ matrix.total_shards }}" \
          --ignore=risk/tests \
          --ignore=catalogs/test_reminders.py \
          .

    - name: Upload coverage reports
      if: always() && hashFiles('app/coverage.xml') != ''
      uses: codecov/codecov-action@v5
      with:
        files: ./app/coverage.xml
        flags: backend-shard-${{ matrix.shard_number }}
        name: backend-coverage-${{ matrix.shard_number }}

  verify-openapi-types:
    name: Verify OpenAPI Types
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend-quality]
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Node.js
      uses: actions/setup-node@v7
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Verify generated OpenAPI types
      run: npm run verify:api-types

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [backend-quality, backend-test-shards, verify-openapi-types]
    if: always()
    steps:
    - name: Check backend quality, OpenAPI types, and test shards
      run: |
        failures=0

        if [[ "${{ needs.backend-quality.result }}" != "success" ]]; then
          echo "::error::Backend Quality finished with '${{ needs.backend-quality.result }}'."
          failures=1
        fi

        if [[ "${{ needs.verify-openapi-types.result }}" != "success" ]]; then
          echo "::error::Verify OpenAPI Types finished with '${{ needs.verify-openapi-types.result }}'."
          failures=1
        fi

        if [[ "${{ needs.backend-test-shards.result }}" != "success" ]]; then
          echo "::error::One or more backend test shards finished with '${{ needs.backend-test-shards.result }}'."
          failures=1
        fi

        if (( failures > 0 )); then
          exit 1
        fi

        echo "Backend quality checks, OpenAPI types, and all backend test shards passed."

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Node.js
      uses: actions/setup-node@v7
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Lint code
      run: npm run lint

    - name: Type check
      run: npm run type-check

    - name: Run tests
      run: npm run test

    - name: Build application
      run: npm run build

    - name: Upload coverage reports
      if: always() && false  # Disabled until tests are configured
      uses: codecov/codecov-action@v5
      with:
        directory: ./frontend/coverage
        flags: frontend
        name: frontend-coverage

  test-frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Node.js
      uses: actions/setup-node@v7
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browser
      run: npx playwright install --with-deps chromium

    - name: Build application
      run: npm run build

    - name: Run Playwright smoke tests
      run: npm run test:e2e

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        format: sarif
        output: 'trivy-results.sarif'

      # only upload when the GITHUB_TOKEN can write (not forked PRs)
    - name: Upload Trivy scan results to Code Scanning
      if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: trivy-results.sarif
        category: trivy-filesystem
    # always keep an artifact so you can see results even on forks
    - name: Upload SARIF as artifact (fallback)
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: trivy-results.sarif
        path: trivy-results.sarif

    - name: Python security check with bandit
      run: |
        pip install bandit
        bandit -r app/ -f json -o bandit-report.json || true

    - name: Node.js security audit
      working-directory: ./frontend
      run: npm audit --audit-level high

  build-test:
    name: Test Docker Build
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-frontend-e2e]

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: false
        tags: grc-platform:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          BUILD_ENV=test
