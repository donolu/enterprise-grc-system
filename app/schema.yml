          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAssessmentReportRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAssessmentReportRequest'
      security:
      - cookieAuth: []
      - SessionAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentReport'
          description: ''
