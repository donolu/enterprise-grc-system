        name: applicability
        schema:
          type: string
        description: Filter by applicability (applicable, not_applicable, conditional)
      - in: query
        name: assigned_to
        schema:
          type: integer
        description: Filter by assigned user ID
      - in: query
        name: completed
        schema:
          type: boolean
        description: Filter by completion status
      - in: query
        name: control
        schema:
          type: integer
      - in: query
        name: control__clauses__framework
        schema:
          type: integer
      - in: query
        name: framework
        schema:
          type: integer
        description: Filter by framework ID
      - in: query
        name: implementation_status
        schema:
          type: string
          enum:
          - implemented
          - not_applicable
          - not_implemented
          - partially_implemented
        description: |-
          Current implementation status of the control

          * `not_implemented` - Not Implemented
          * `partially_implemented` - Partially Implemented
          * `implemented` - Implemented
          * `not_applicable` - Not Applicable
      - in: query
        name: my_assignments
        schema:
          type: boolean
        description: Show only assessments assigned to current user
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: overdue
        schema:
          type: boolean
        description: Show only overdue assessments
      - in: query
        name: reviewer
        schema:
          type: integer
      - in: query
        name: risk_rating
        schema:
          type: string
          enum:
          - critical
          - high
          - low
          - medium
        description: |-
          Risk level if this control is not properly implemented

          * `low` - Low
          * `medium` - Medium
          * `high` - High
          * `critical` - Critical
      - in: query
        name: search
        schema:
          type: string
        description: Search across assessment_id, control_id, control_name, and assessment_notes
      - in: query
        name: status
        schema:
          type: string
        description: Filter by assessment status (not_started, pending, in_progress,
          under_review, complete, not_applicable)
      tags:
      - Assessments
      security:
      - cookieAuth: []
      - SessionAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ControlAssessmentList'
              examples:
                MyOverdueAssessments:
