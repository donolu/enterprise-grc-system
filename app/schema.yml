  /api/assets/assets/:
    get:
      operationId: assets_assets_list
      description: CRUD API for information assets.
      parameters:
      - in: query
        name: asset_type
        schema:
          type: string
          enum:
          - application
          - database
          - document
          - infrastructure
          - mobile_device
          - monitor
          - other
          - printer
          - server
          - workstation
        description: |-
          * `server` - Server
          * `workstation` - Workstation
          * `monitor` - Monitor
          * `mobile_device` - Mobile Device
          * `printer` - Printer
          * `infrastructure` - Infrastructure
          * `application` - Application
          * `database` - Database
          * `document` - Document
          * `other` - Other
      - in: query
        name: classification
        schema:
          type: string
          enum:
          - confidential
          - internal
          - public
          - restricted
        description: |-
          * `public` - Public
          * `internal` - Internal
          * `confidential` - Confidential
          * `restricted` - Restricted
      - in: query
        name: criticality
        schema:
          type: string
          enum:
          - critical
          - high
          - low
          - medium
        description: |-
          * `low` - Low
          * `medium` - Medium
          * `high` - High
          * `critical` - Critical
      - in: query
        name: lifecycle_status
        schema:
          type: string
          enum:
          - active
          - disposed
          - maintenance
          - planned
          - retired
        description: |-
          * `planned` - Planned
          * `active` - Active
          * `maintenance` - Maintenance
          * `retired` - Retired
          * `disposed` - Disposed
      - in: query
        name: location
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: owner
        schema:
          type: integer
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - assets
      security:
      - cookieAuth: []
      - SessionAuth: []
      responses:
