openapi: 3.0.3
info:
  title: GRC SaaS API
  version: 1.0.0
  description: "\n    Comprehensive API for Governance, Risk, and Compliance (GRC)
    management.\n\n    This API provides complete functionality for compliance framework
    management,\n    control assessments, evidence collection, reporting, and automated
    reminders.\n\n    ## Features\n    - **Framework Management**: Import and manage
    compliance frameworks (ISO 27001, NIST CSF, SOC 2, etc.)\n    - **Assessment Workflow**:
    Complete control assessment lifecycle with status tracking\n    - **Evidence Management**:
    Upload, link, and organize evidence with bulk operations\n    - **Automated Reporting**:
    Generate professional PDF reports for audits and compliance\n    - **Smart Reminders**:
    Configurable email notifications for due dates and overdue items\n    - **Multi-tenant
    Architecture**: Complete tenant isolation with secure data scoping\n\n    ## Authentication\n
    \   This API uses session-based authentication. Users must be authenticated to
    access endpoints.\n\n    ## Tenant Scoping\n    All data is automatically scoped
    to the authenticated user's tenant. Cross-tenant access is prevented.\n    "
  contact:
    name: GRC SaaS Support
    email: support@grcsaas.com
  license:
    name: Proprietary
paths:
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: Create a new user account with email, username, and password. Account
        will be associated with the current tenant.
      summary: Register new user
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - cookieAuth: []
      - SessionAuth: []
      - {}
      responses:
        '201':
          description: User created successfully
        '400':
          description: Validation errors (username taken, weak password, etc.)
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: Authenticate user with credentials. If 2FA is enabled, returns
        2FA challenge instead of session.
      summary: User login
      tags:
