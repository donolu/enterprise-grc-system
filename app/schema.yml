components:
  schemas:
    ActionEnum:
      enum:
      - created
      - updated
      - deleted
      - reminder_sent
      type: string
      description: |-
        * `created` - Created
        * `updated` - Updated
        * `deleted` - Deleted
        * `reminder_sent` - Reminder sent
    ActionTypeEnum:
      enum:
      - preventive
      - detective
      - corrective
      - policy
      - training
      - technical
      - assessment
      - other
      type: string
      description: |-
        * `preventive` - Preventive Control
        * `detective` - Detective Control
        * `corrective` - Corrective Action
        * `policy` - Policy/Procedure
        * `training` - Training/Awareness
        * `technical` - Technical Implementation
        * `assessment` - Assessment/Review
        * `other` - Other
    ApplicabilityEnum:
      enum:
      - applicable
      - not_applicable
      - to_be_determined
      type: string
      description: |-
        * `applicable` - Applicable
        * `not_applicable` - Not Applicable
        * `to_be_determined` - To Be Determined
    ApplicabilityStatusEnum:
      enum:
      - under_review
      - applicable
      - not_applicable
      type: string
      description: |-
        * `under_review` - Under Review
        * `applicable` - Applicable
        * `not_applicable` - Not Applicable
    ApprovalAction:
      type: object
      description: Serializer for approval/rejection actions.
      properties:
        notes:
          type: string
          description: Optional notes about the approval/rejection
          maxLength: 1000
        rejection_reason:
          type: string
          description: Required for rejections - explain why the request was rejected
          maxLength: 1000
    ApprovalActionRequest:
      type: object
      description: Serializer for approval/rejection actions.
      properties:
        notes:
          type: string
          description: Optional notes about the approval/rejection
          maxLength: 1000
        rejection_reason:
          type: string
          description: Required for rejections - explain why the request was rejected
          maxLength: 1000
    ArtefactTypeEnum:
      enum:
      - scope_document
      - metrics_pack
      - agenda
      - management_review_pack
      - regulatory_contractual_sheet
      - nonconformity_log
      - other
      type: string
      description: |-
        * `scope_document` - Scope Document
        * `metrics_pack` - Metrics Pack
        * `agenda` - Agenda
        * `management_review_pack` - Management Review Pack
        * `regulatory_contractual_sheet` - Regulatory and Contractual Sheet
        * `nonconformity_log` - Non-Conformity Log
        * `other` - Other
    AssessmentEvidence:
      type: object
      description: Serializer for assessment evidence links.
      properties:
        id:
          type: integer
          readOnly: true
        assessment:
          type: integer
        evidence:
          type: integer
        evidence_details:
          allOf:
          - $ref: '#/components/schemas/ControlEvidence'
          readOnly: true
        evidence_purpose:
          type: string
          description: Purpose of this evidence for the assessment
          maxLength: 100
        is_primary_evidence:
          type: boolean
          description: Whether this is primary evidence for the assessment
        created_by_username:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - assessment
      - created_at
      - created_by_username
      - evidence
      - evidence_details
      - id
    AssessmentEvidenceRequest:
      type: object
      description: Serializer for assessment evidence links.
      properties:
        assessment:
          type: integer
        evidence:
          type: integer
        evidence_purpose:
          type: string
          description: Purpose of this evidence for the assessment
          maxLength: 100
        is_primary_evidence:
          type: boolean
          description: Whether this is primary evidence for the assessment
      required:
      - assessment
      - evidence
    AssessmentProgress:
      type: object
      description: Serializer for assessment progress reporting.
      properties:
        framework_id:
          type: integer
        total_assessments:
          type: integer
        completed_assessments:
          type: integer
        overdue_assessments:
          type: integer
        completion_percentage:
          type: number
          format: double
        status_breakdown:
          type: object
          additionalProperties: {}
        applicability_breakdown:
          type: object
          additionalProperties: {}
        risk_breakdown:
          type: object
          additionalProperties: {}
        upcoming_due_dates:
          type: array
          items: {}
        assignments_by_user:
          type: object
          additionalProperties: {}
      required:
      - applicability_breakdown
      - assignments_by_user
      - completed_assessments
      - completion_percentage
      - overdue_assessments
      - risk_breakdown
      - status_breakdown
      - total_assessments
      - upcoming_due_dates
    AssessmentReport:
      type: object
      description: Serializer for AssessmentReport model.
      properties:
        id:
          type: integer
          readOnly: true
        report_type:
          $ref: '#/components/schemas/ReportTypeEnum'
