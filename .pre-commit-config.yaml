repos:
  - repo: local
    hooks:
      - id: branch-name
        name: Check branch name
        language: script
        entry: .github/scripts/check-branch-name.sh
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: debug-statements
        files: ^app/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.9
    hooks:
      - id: ruff
        args: [--fix]
        files: ^app/

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        files: ^app/
        exclude: ^app/(.*/tests/|generate_dummy_data.*|generate_tenant_dummy_data\.py|test_sso_final\.py)
        additional_dependencies: ["bandit[toml]"]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        language: script
        entry: .github/scripts/run-mypy.sh
        pass_filenames: false
        files: ^app/.*\.py$
        stages: [pre-push]
