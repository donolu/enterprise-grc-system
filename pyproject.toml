[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [
    ".eggs",
    ".git",
    ".hg",
    ".mypy_cache",
    ".pytest_cache",
    ".tox",
    ".venv",
    "venv",
    "node_modules",
    "*/migrations/*",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "S", "RUF"]
ignore = [
    "E501",
    "F401",
    "F841",
    "F541",
    # Existing legacy debt to remove incrementally under the Ruff cleanup issue.
    "I001",
    "UP006",
    "UP007",
    "UP015",
    "UP035",
    "B007",
    "B017",
    "B904",
    "S101",
    "S106",
    "S108",
    "S110",
    "S307",
    "S308",
    "RUF001",
    "RUF005",
    "RUF010",
    "RUF012",
    "RUF013",
    "RUF019",
    "RUF100",
]

[tool.ruff.lint.isort]
known-first-party = [
    "app",
    "api",
    "audit",
    "authn",
    "billing",
    "catalogs",
    "compliance",
    "core",
    "events",
    "exports",
    "policies",
    "risk",
    "search",
    "sso",
    "training",
    "vendors",
    "vuln",
]

[tool.ruff.lint.per-file-ignores]
"app/app/settings/*.py" = ["F403", "F405"]
"**/tests/**" = ["S105", "S106"]
"**/test_*.py" = ["S105", "S106"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "app.settings.test"
python_files = ["tests.py", "test_*.py", "*_tests.py"]
testpaths = ["app"]
addopts = """
    --verbose
    --tb=short
    --strict-markers
    --strict-config
    --reuse-db
    --nomigrations
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=70
"""
filterwarnings = [
    "ignore::django.utils.deprecation.RemovedInDjango50Warning",
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
    "stripe: marks tests that require Stripe API",
    "azure: marks tests that require Azure services",
]

[tool.coverage.run]
source = "."
omit = [
    "*/migrations/*",
    "*/venv/*",
    "*/node_modules/*",
    "manage.py",
    "*/settings/*",
    "*/tests/*",
    "*/__pycache__/*",
    "*/staticfiles/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]

[tool.bandit]
exclude_dirs = ["tests", "migrations", "node_modules", "venv"]
skips = ["B101", "B601"]  # Skip assert_used_in_tests, shell_injection_process

[tool.mypy]
python_version = "3.12"
check_untyped_defs = true
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unused_configs = true
